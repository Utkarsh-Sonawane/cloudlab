events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/x-font-ttf font/opentype;

  upstream django_backend {
    server backend:8000;
  }

  upstream vite_frontend {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name localhost;

    # Frontend static (dev: proxy to Vite)
    location / {
      proxy_pass         http://vite_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # API requests
    location /api/ {
      proxy_pass         http://django_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket connections
    location /ws/ {
      proxy_pass         http://django_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Django static & media
    location /static/ { proxy_pass http://django_backend; }
    location /media/  { proxy_pass http://django_backend; }

    # Health check
    location /health/ { proxy_pass http://django_backend; }

    # Prometheus metrics
    location /metrics { proxy_pass http://django_backend; }
  }
}
