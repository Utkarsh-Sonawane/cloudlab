# =============================================================================
# CloudLab Platform — Docker Compose (Local Development)
# =============================================================================

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - ./backend:/app
    - media_files:/app/media
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - cloudlab_network

services:
  # ── PostgreSQL 15 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cloudlab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudlab
      POSTGRES_USER: cloudlab
      POSTGRES_PASSWORD: cloudlab
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cloudlab -d cloudlab" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudlab_network

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudlab_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudlab_network

  # ── Django Backend (Daphne ASGI) ─────────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: cloudlab_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 cloudlab.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - /var/run/docker.sock:/var/run/docker.sock # Docker socket for lab provisioning
    environment:
      - DJANGO_SETTINGS_MODULE=cloudlab.settings.development

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery:
    <<: *backend-common
    container_name: cloudlab_celery
    restart: unless-stopped
    command: celery -A cloudlab worker -l info
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  celery-beat:
    <<: *backend-common
    container_name: cloudlab_celery_beat
    restart: unless-stopped
    command: celery -A cloudlab beat -l info

  # ── React Frontend (Vite Dev Server) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudlab_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_BASE_URL=ws://localhost:8000
    networks:
      - cloudlab_network

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cloudlab_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_files:/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cloudlab_network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_files:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  cloudlab_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
